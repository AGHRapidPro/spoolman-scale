; https://docs.platformio.org/page/projectconf.html

[env:lolin_s2_mini]
platform = espressif32
board = lolin_s2_mini
framework = arduino
monitor_speed = 115200
lib_deps =
    miguelbalboa/MFRC522@^1.4.11
    bogde/HX711@^0.7.5
    bblanchon/ArduinoJson@^6.21.3
    tzapu/WiFiManager@^2.0.17